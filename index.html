// ============ PETALS ============
const PetalsRain = () => {
  const colors = ['#C59881','#EAE3DB','#4A634D','#F9F6F2'];
  const [petals, setPetals] = useState([]);
  
  useEffect(() => {
    // Menos pétalas em ecrãs móveis para melhorar a performance
    const isMobile = window.innerWidth < 768;
    const petalCount = isMobile ? 10 : 20;
    
    setPetals(Array.from({length: petalCount}).map((_, i) => ({
      id: i,
      left: (Math.random() * 100) + '%',
      delay: (Math.random() * 12) + 's',
      duration: (10 + Math.random() * 8) + 's',
      width: (10 + Math.random() * 14) + 'px',
      height: (14 + Math.random() * 18) + 'px',
      color: colors[Math.floor(Math.random() * colors.length)],
    })));
  }, []);
  
  return (
    <div className="fixed inset-0 pointer-events-none z-50 overflow-hidden">
      {petals.map(p => (
        <div key={p.id} className="petal" style={{
          left: p.left, width: p.width, height: p.height,
          backgroundColor: p.color,
          animationDelay: p.delay, animationDuration: p.duration,
          top: '-60px',
        }}/>
      ))}
    </div>
  );
};

            </div>

            <div className="bg-sand/60 p-8 lg:p-16 rounded-sm border border-gray-50">
              <h3 className="font-serif text-2xl lg:text-3xl mb-2 leading-tight text-center lg:text-left text-dark">{t.mystery.rTitle}</h3>
              <p className="text-gray-500 text-sm font-medium italic mb-8 lg:mb-10 text-center lg:text-left">{t.mystery.rDesc}</p>
              <ul className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                <li className="flex items-center gap-4 group cursor-default">
                  <div className="p-2.5 bg-white rounded-full text-bronze shadow-sm transition-all group-hover:rotate-12"><Icon.Flower size={14} /></div>
                  <span className="text-[9px] lg:text-[10px] tracking-widest uppercase font-semibold text-gray-500 transition-colors group-hover:text-black">{t.mystery.items[0]}</span>
                </li>
                <li className="flex items-center gap-4 group cursor-default">
                  <div className="p-2.5 bg-white rounded-full text-bronze shadow-sm transition-all group-hover:scale-110"><Icon.Bonnet size={14} /></div>
                  <span className="text-[9px] lg:text-[10px] tracking-widest uppercase font-semibold text-gray-500 transition-colors group-hover:text-black">{t.mystery.items[1]}</span>
                </li>
                <li className="flex items-center gap-4 group cursor-default">
                  <div className="p-2.5 bg-white rounded-full text-bronze shadow-sm transition-all group-hover:-rotate-12"><Icon.BananaClip size={14} /></div>
                  <span className="text-[9px] lg:text-[10px] tracking-widest uppercase font-semibold text-gray-500 transition-colors group-hover:text-black">{t.mystery.items[2]}</span>
                </li>
                <li className="flex items-center gap-4 group cursor-default">
                  <div className="p-2.5 bg-white rounded-full text-bronze shadow-sm transition-all group-hover:translate-x-1"><Icon.Comb size={14} /></div>
                  <span className="text-[9px] lg:text-[10px] tracking-widest uppercase font-semibold text-gray-500 transition-colors group-hover:text-black">{t.mystery.items[3]}</span>
                </li>
                <li className="flex items-center gap-4 group cursor-default">
                  <div className="p-2.5 bg-white rounded-full text-bronze shadow-sm transition-all group-hover:animate-pulse"><Icon.ScalpMassager size={14} /></div>
                  <span className="text-[9px] lg:text-[10px] tracking-widest uppercase font-semibold text-gray-500 transition-colors group-hover:text-black">{t.mystery.items[4]}</span>
                </li>
                <li className="flex items-center gap-4 group cursor-default">
                  <div className="p-2.5 bg-white rounded-full text-bronze shadow-sm transition-all group-hover:translate-y-0.5"><Icon.Pipette size={14} /></div>
                  <span className="text-[9px] lg:text-[10px] tracking-widest uppercase font-semibold text-gray-500 transition-colors group-hover:text-black">{t.mystery.items[5]}</span>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </section>

      {/* ======= DIAGNOSIS / FORM ======= */}
      <section id="diagnostico" className="py-20 lg:py-32 bg-[#2C2C2C] text-white relative overflow-hidden">
        <div className="absolute top-[-10%] right-[-10%] w-[400px] h-[400px] lg:w-[600px] lg:h-[600px] rounded-full pointer-events-none" style={{background:'radial-gradient(circle, rgba(197,152,129,0.06) 0%, transparent 70%)'}}/>
        
        <div className="max-w-7xl mx-auto px-6 relative z-10">
          <div className="max-w-[1100px] mx-auto grid grid-cols-1 lg:grid-cols-2 gap-16 lg:gap-24 items-center">
            <div className="flex flex-col gap-8 text-center lg:text-left">
              <span className="text-bronze text-[9px] lg:text-[11px] tracking-[0.4em] lg:tracking-[0.6em] uppercase font-bold">{t.diag.tag}</span>
              <h2 className="font-serif text-4xl sm:text-5xl lg:text-[clamp(3.5rem,5vw,4.5rem)] leading-tight italic m-0">
                {t.diag.t1}<br/><span className="not-italic">{t.diag.t2}</span>
              </h2>
              <p className="text-gray-400 font-light leading-relaxed text-base lg:text-xl max-w-md mx-auto lg:mx-0">{t.diag.desc}</p>
              
              <div className="flex flex-wrap justify-center lg:justify-start gap-8 lg:gap-12 opacity-30 pt-6 lg:pt-8">
                {[[<Icon.Brain size={36}/>,t.diag.i1],[<Icon.History size={36}/>,t.diag.i2],[<Icon.User size={36}/>,t.diag.i3]].map(([icon,label],i)=>(
                  <div key={i} className="flex flex-col items-center gap-2">
                    {icon}
                    <span className="text-[8px] lg:text-[9px] uppercase tracking-widest">{label}</span>
                  </div>
                ))}
              </div>
            </div>

            <div className="bg-white p-8 lg:p-14 rounded-sm shadow-2xl text-dark">
              {formStatus === 'success' ? (
                <div className="text-center py-12 lg:py-16">
                  <div className="flex justify-center mb-6"><Icon.Check size={48} className="text-sage" /></div>
                  <h3 className="font-serif text-3xl lg:text-4xl mb-4">{t.diag.s1}</h3>
                  <p className="text-gray-500 mb-8">{t.diag.s2}</p>
                  <button onClick={()=>setFormStatus('idle')} className="text-bronze uppercase text-[10px] font-bold tracking-widest bg-transparent border-b border-bronze pb-1 cursor-pointer">{t.diag.s3}</button>
                </div>
                ) : formStatus === 'error' ? (
                <div className="text-center py-12 lg:py-16">
                  <div className="flex justify-center mb-6"><Icon.X size={48} className="text-red-700" /></div>
                  <h3 className="font-serif text-3xl lg:text-4xl mb-4">{t.diag.s4 || "Erro ao enviar"}</h3>
                  <p className="text-gray-500 mb-8">{t.diag.s2}</p>
                  <button onClick={()=>setFormStatus('idle')} className="text-bronze uppercase text-[10px] font-bold tracking-widest bg-transparent border-b border-bronze pb-1 cursor-pointer">{t.diag.s3}</button>
                </div>
                ) : (
                <>
                  <h3 className="font-serif text-2xl lg:text-3xl mb-8 lg:mb-12 text-center text-dark">{t.diag.formTitle}</h3>
                  <form onSubmit={handleSubmit} className="flex flex-col gap-6 lg:gap-8">
                    {[
                      {label:t.diag.l1, type:'text', placeholder:t.diag.p1, name: t.diag.name1, id:t.diag.name1},
                      {label:t.diag.l2, type:'tel', placeholder:t.diag.p2, name: t.diag.name2, id:t.diag.name2},
                      {label:t.diag.l3, type:'email', placeholder:t.diag.p3, name: t.diag.name3, id:t.diag.name3}
                    ].map((f,i)=>(
                      <div key={i}>
                        <label className="field-label" htmlFor={f.id}>{f.label}</label>
                        <input required type={f.type} placeholder={f.placeholder} className="input-field" id={f.id} name={f.name}/>
                      </div>
                    ))}
                    <div>
                      <label htmlFor="hairType" className="field-label">{t.diag.l4}</label>
                      <div className="relative">
                        <select className="input-field" id="hairType" name="hairType" required>
                          <option value="">{t.diag.o3_0}</option>
                          <option value="liso">{t.diag.o3_1}</option>
                          <option value="ondulado">{t.diag.o3_2}</option>
                          <option value="cacheado">{t.diag.o3_3}</option>
                          <option value="crespo">{t.diag.o3_4}</option>
                        </select>
                        <div className="absolute right-0 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400"><Icon.ChevronDown/></div>
                      </div>
                    </div>
                    <div>
                      <label htmlFor="ritualInterest" className="field-label">{t.diag.l5}</label>
                      <div className="relative">
                        <select className="input-field" id="ritualInterest" name="ritualInterest" required>
                          <option value="spa_cachos_oleos">{t.diag.o4_1}</option>
                          <option value="spa_crescimento_forca">{t.diag.o4_2}</option>
                          <option value="spa_matizacao_loiras">{t.diag.o4_3}</option>
                          <option value="misterio_venus">{t.diag.o4_4}</option>
                          <option value="outro">{t.diag.o4_5}</option>
                        </select>
                        <div className="absolute right-0 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400"><Icon.ChevronDown/></div>
                      </div>
                    </div>
                    <button type="submit" disabled={formStatus==='submitting'} className="btn-premium w-full mt-4 py-4 lg:py-5 text-[11px] lg:text-[12px] tracking-[0.3em] lg:tracking-[0.4em] uppercase border-none rounded-sm font-bold shadow-xl cursor-pointer">
                      {formStatus === 'submitting' ? '...' : t.diag.btn}
                    </button>
                  </form>
                </>
              )}
            </div>
          </div>
        </div>
      </section>

      {/* ======= ETHICS BAR ======= */}
      <section className="py-10 lg:py-12 bg-white border-t border-gray-50">
        <div className="max-w-7xl mx-auto px-6 flex flex-col sm:flex-row items-center justify-center gap-6 sm:gap-16 opacity-60">
          <div className="flex items-center gap-3">
            <Icon.Leaf size={18} className="text-sage" />
            <span className="text-[9px] sm:text-[10px] tracking-[0.3em] uppercase font-bold text-dark">{t.footer.vegan}</span>
          </div>
          <div className="flex items-center gap-3">
            <Icon.Paw size={18} className="text-sage" />
            <span className="text-[9px] sm:text-[10px] tracking-[0.3em] uppercase font-bold text-dark">{t.footer.cruelty}</span>
          </div>
        </div>
      </section>

      {/* ======= FOOTER ======= */}
      <footer className="py-16 lg:py-24 bg-white border-t border-gray-50">
        <div className="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center text-center md:text-left gap-10">
          <div className="flex flex-col md:flex-row items-center gap-6">
            <MainLogo size={70} showText={false}/>
            <div>
              <div className="font-serif text-2xl lg:text-[1.875rem] font-bold mb-1 tracking-tight text-dark">Cabelos com Amor</div>
              <p className="text-[8px] lg:text-[10px] tracking-[0.2em] text-bronze uppercase font-bold">{t.footer.sub}</p>
            </div>
          </div>
          <div className="text-[9px] lg:text-[11px] tracking-[0.2em] text-gray-400 uppercase font-bold">
            © {new Date().getFullYear()} CABELO VÊNUS • TODOS OS DIREITOS RESERVADOS.
          </div>
        </div>
      </footer>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
