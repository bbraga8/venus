const PetalsRain = () => {

  const petals = Array.from({length: 20}).map((_, i) => ({
    id: i,
    left: (Math.random() * 100) + '%',
    delay: (Math.random() * 12) + 's',
    duration: (10 + Math.random() * 8) + 's',
    width: (10 + Math.random() * 14) + 'px',
    height: (14 + Math.random() * 18) + 'px',
    color: colors[Math.floor(Math.random() * colors.length)],
  }));
  return (
    <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:9999,overflow:'hidden'}}>
      {petals.map(p => (
        <div key={p.id} className="petal" style={{
          left: p.left, width: p.width, height: p.height,
          backgroundColor: p.color,
          animationDelay: p.delay, animationDuration: p.duration,
          top: '-60px',
        }}/>
      ))}
    </div>
  );
};

              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'24px'}}>
                <div style={{padding:'32px',background:'#F9F6F2',borderTop:'4px solid #C59881',cursor:'default',transition:'all 0.3s'}}
                  onMouseOver={e=>{e.currentTarget.style.boxShadow='0 20px 40px rgba(0,0,0,0.08)';}}
                  onMouseOut={e=>{e.currentTarget.style.boxShadow='none';}}>
                  <Icon.Package size={32} style={{color:'#C59881',marginBottom:'16px'}}/>
                  <h4 style={{fontFamily:"'Playfair Display',serif",fontSize:'1.25rem',marginBottom:'4px'}}>{t.mystery.box1}</h4>
                  <p style={{fontSize:'9px',textTransform:'uppercase',letterSpacing:'0.2em',opacity:0.5,fontStyle:'italic',fontWeight:700}}>{t.mystery.box1tag}</p>
                </div>
                <div style={{padding:'32px',background:'#F9F6F2',borderTop:'4px solid #4A634D',cursor:'default',transition:'all 0.3s'}}
                  onMouseOver={e=>{e.currentTarget.style.boxShadow='0 20px 40px rgba(0,0,0,0.08)';}}
                  onMouseOut={e=>{e.currentTarget.style.boxShadow='none';}}>
                  <Icon.Stars size={32} style={{color:'#4A634D',marginBottom:'16px'}}/>
                  <h4 style={{fontFamily:"'Playfair Display',serif",fontSize:'1.25rem',marginBottom:'4px'}}>{t.mystery.box2}</h4>
                  <p style={{fontSize:'9px',textTransform:'uppercase',letterSpacing:'0.2em',opacity:0.5,fontStyle:'italic',fontWeight:700}}>{t.mystery.box2tag}</p>
                </div>
              </div>
            </div>

            <div style={{background:'rgba(249,246,242,0.6)',padding:'64px',borderRadius:'2px',border:'1px solid #f9fafb'}}>
              <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:'1.875rem',marginBottom:'8px',lineHeight:1.2}}>{t.mystery.rTitle}</h3>
              <p style={{color:'#9ca3af',fontSize:'14px',fontWeight:500,fontStyle:'italic',marginBottom:'40px'}}>{t.mystery.rDesc}</p>
              <ul style={{listStyle:'none',display:'grid',gridTemplateColumns:'1fr 1fr',gap:'24px'}}>
                {[
                  [<Icon.Flower size={14}/>, t.mystery.items[0]],
                  [<span style={{fontSize:'11px'}}>🧢</span>, t.mystery.items[1]],
                  [<span style={{fontSize:'11px'}}>✂️</span>, t.mystery.items[2]],
                  [<span style={{fontSize:'11px'}}>♻</span>, t.mystery.items[3]],
                  [<span style={{fontSize:'11px'}}>💆</span>, t.mystery.items[4]],
                  [<Icon.Pipette size={14}/>, t.mystery.items[5]],
                ].map(([icon, label], i) => (
                  <li key={i} style={{display:'flex',alignItems:'center',gap:'16px',cursor:'default',padding:'4px 0'}}>
                    <div style={{padding:'10px',background:'white',borderRadius:'50%',color:'#C59881',boxShadow:'0 1px 4px rgba(0,0,0,0.06)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{icon}</div>
                    <span style={{fontSize:'10px',letterSpacing:'0.15em',textTransform:'uppercase',fontWeight:600,color:'#6b7280'}}>{label}</span>
                  </li>
                ))}
              </ul>
            </div>
          </div>
        </div>
      </section>

      {/* ======= DIAGNOSIS / FORM ======= */}
      <section id="diagnostico" style={{padding:'128px 0',background:'#2C2C2C',color:'white',position:'relative',overflow:'hidden'}}>
        {/* Bg decoration */}
        <div style={{position:'absolute',top:'-20%',right:'-10%',width:'600px',height:'600px',borderRadius:'50%',background:'radial-gradient(circle, rgba(197,152,129,0.06) 0%, transparent 70%)',pointerEvents:'none'}}/>
        
        <div style={{maxWidth:'1280px',margin:'0 auto',padding:'0 24px',position:'relative',zIndex:1}}>
          <div style={{maxWidth:'1100px',margin:'0 auto',display:'grid',gridTemplateColumns:'1fr 1fr',gap:'96px',alignItems:'center'}}>
            <div style={{display:'flex',flexDirection:'column',gap:'32px'}}>
              <span style={{color:'#C59881',fontSize:'11px',letterSpacing:'0.6em',textTransform:'uppercase',fontWeight:700}}>{t.diag.tag}</span>
              <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:'clamp(3rem,5vw,4.5rem)',lineHeight:1.05,fontStyle:'italic',margin:0}}>
                {t.diag.t1}<br/><span style={{fontStyle:'normal'}}>{t.diag.t2}</span>
              </h2>
              <p style={{color:'#9ca3af',fontWeight:300,lineHeight:1.9,fontSize:'1.25rem',maxWidth:'440px'}}>{t.diag.desc}</p>
              <div style={{display:'flex',gap:'48px',opacity:0.25,paddingTop:'32px'}}>
                {[[<Icon.Brain size={44}/>,t.diag.i1],[<Icon.History size={44}/>,t.diag.i2],[<Icon.User size={44}/>,t.diag.i3]].map(([icon,label],i)=>(
                  <div key={i} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'8px'}}>
                    {icon}
                    <span style={{fontSize:'9px',textTransform:'uppercase',letterSpacing:'0.2em'}}>{label}</span>
                  </div>
                ))}
              </div>
            </div>

            <div style={{background:'white',padding:'64px',borderRadius:'2px',boxShadow:'0 40px 100px rgba(0,0,0,0.3)',color:'#2C2C2C'}}>
              {formStatus === 'success' ? (
                <div style={{textAlign:'center',padding:'48px 0'}}>
                  <Icon.Check size={48} style={{color:'#4A634D',margin:'0 auto 32px'}}/>
                  <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:'2.5rem',marginBottom:'16px'}}>{t.diag.s1}</h3>
                  <p style={{color:'#6b7280',marginBottom:'40px'}}>{t.diag.s2}</p>
                  <button onClick={()=>setFormStatus('idle')} style={{color:'#C59881',textTransform:'uppercase',fontSize:'10px',fontWeight:700,letterSpacing:'0.15em',background:'none',border:'none',borderBottom:'1px solid #C59881',paddingBottom:'4px',cursor:'pointer'}}>{t.diag.s3}</button>
                </div>
                ) : formStatus === 'error' ? (
                <div style={{textAlign:'center',padding:'48px 0'}}>
                <Icon.X size={48} style={{color:'#B91C1C',margin:'0 auto 32px'}}/>
                <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:'2.5rem',marginBottom:'16px'}}>{t.diag.s4 || "Erro ao enviar"}</h3>
                <p style={{color:'#6b7280',marginBottom:'40px'}}>{t.diag.s2}</p>
                <button onClick={()=>setFormStatus('idle')}>{t.diag.s3}</button>
                </div>
                ) : (
                <>
                  <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:'2rem',marginBottom:'48px',textAlign:'center'}}>{t.diag.formTitle}</h3>
                  <form onSubmit={handleSubmit} style={{display:'flex',flexDirection:'column',gap:'32px'}}>
                    {[
                      {label:t.diag.l1, type:'text', placeholder:t.diag.p1, name: t.diag.name1, id:t.diag.name1},
                      {label:t.diag.l2, type:'tel', placeholder:t.diag.p2, name: t.diag.name2, id:t.diag.name2},
                      {label:t.diag.l3, type:'email', placeholder:t.diag.p3, name: t.diag.name3, id:t.diag.name3}
					  ].map((f,i)=>(
                      <div key={i}>
                        <label className="field-label">{f.label}</label>
                        <input required type={f.type} placeholder={f.placeholder} className="input-field" id={f.id} name={f.name}/>
                      </div>
                    ))}
                    <div>
                      <label htmlFor="hairType" className="field-label">{t.diag.l3}</label>
                      <div style={{position:'relative'}}>
                        <select className="input-field" id="hairType" name="hairType" >
                          <option value="">{t.diag.o3_0}</option>
                          <option value="liso">{t.diag.o3_1}</option>
                          <option value="ondulado">{t.diag.o3_2}</option>
                          <option value="cacheado">{t.diag.o3_3}</option>
                          <option value="crespo">{t.diag.o3_4}</option>
                        </select>
                        <div style={{position:'absolute',right:0,top:'50%',transform:'translateY(-50%)',pointerEvents:'none',color:'#d1d5db'}}><Icon.ChevronDown/></div>
                      </div>
                    </div>
                    <div>
                      <label htmlFor="ritualInterest" className="field-label">{t.diag.l4}</label>
                      <div style={{position:'relative'}}>
                        <select className="input-field" id="ritualInterest" name="ritualInterest">
                          <option value="spa_cachos_oleos">{t.diag.o4_1}</option>
                          <option value="spa_crescimento_forca">{t.diag.o4_2}</option>
                          <option value="spa_matizacao_loiras">{t.diag.o4_3}</option>
                          <option value="misterio_venus">{t.diag.o4_4}</option>
                          <option value="outro">{t.diag.o4_5}</option>
                        </select>
                        <div style={{position:'absolute',right:0,top:'50%',transform:'translateY(-50%)',pointerEvents:'none',color:'#d1d5db'}}><Icon.ChevronDown/></div>
                      </div>
                    </div>
                    <button type="submit" disabled={formStatus==='submitting'} className="btn-premium" style={{width:'100%',padding:'22px',fontSize:'12px',letterSpacing:'0.4em',textTransform:'uppercase',border:'none',cursor:'pointer',borderRadius:'2px',fontWeight:700,marginTop:'8px'}}>
                      {formStatus === 'submitting' ? '...' : t.diag.btn}
                    </button>
					
                  </form>
                </>
              )}
            </div>
          </div>
        </div>
      </section>

      {/* ======= ETHICS BAR ======= */}
      <section style={{padding:'48px 0',background:'white',borderTop:'1px solid #f9fafb'}}>
        <div style={{maxWidth:'1280px',margin:'0 auto',padding:'0 24px',display:'flex',justifyContent:'center',gap:'64px',flexWrap:'wrap',opacity:0.5}}>
          <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
            <Icon.Leaf size={20} style={{color:'#4A634D'}}/>
            <span style={{fontSize:'10px',letterSpacing:'0.3em',textTransform:'uppercase',fontWeight:700}}>{t.footer.vegan}</span>
          </div>
		
          <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
            <Icon.Paw size={20} style={{color:'#4A634D'}}/>
            <span style={{fontSize:'10px',letterSpacing:'0.3em',textTransform:'uppercase',fontWeight:700}}>{t.footer.cruelty}</span>
          </div>
        </div>
      </section>

      {/* ======= FOOTER ======= */}
      <footer style={{padding:'96px 0',background:'white',borderTop:'1px solid #f9fafb'}}>
        <div style={{maxWidth:'1280px',margin:'0 auto',padding:'0 24px',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'40px'}}>
          <div style={{display:'flex',alignItems:'center',gap:'16px'}}>
            <MainLogo size={80} showText={false}/>
            <div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:'1.875rem',fontWeight:700,marginBottom:'4px',letterSpacing:'-0.02em'}}>Cabelos com Amor</div>
              <p style={{fontSize:'10px',letterSpacing:'0.2em',color:'#C59881',textTransform:'uppercase',fontWeight:800}}>{t.footer.sub}</p>
            </div>
          </div>
          <div style={{fontSize:'11px',letterSpacing:'0.2em',color:'#d1d5db',textTransform:'uppercase',fontWeight:700,textAlign:'right'}}>
            © {new Date().getFullYear()} CABELO VÊNUS • TODOS OS DIREITOS RESERVADOS.
          </div>
        </div>
      </footer>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
